    namespace: mock-server-mock-servers-rest
    port: 8080
    description: REST adapter for Insomnia Mock Server API — Mock Servers. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/mock-servers
      name: mock-servers
      description: REST surface for mock-servers.
      operations:
      - method: GET
        name: listmockservers
        description: Insomnia List Mock Servers
        call: mock-server-mock-servers.listmockservers
        with:
          workspaceId: rest.workspaceId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createmockserver
        description: Insomnia Create Mock Server
        call: mock-server-mock-servers.createmockserver
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
