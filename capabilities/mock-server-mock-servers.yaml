      - name: deletemockserver
        method: DELETE
        description: Insomnia Delete Mock Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.INSOMNIA_API_KEY}}'
  exposes:
