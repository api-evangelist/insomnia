naftiko: 1.0.0-alpha2
info:
  label: Insomnia Mock Server API — Mock Servers
  description: 'Insomnia Mock Server API — Mock Servers. 5 operations. Lead operation: Insomnia List Mock Servers. Self-contained
    Naftiko capability covering one Insomnia business surface.'
  tags:
  - Insomnia
  - Mock Servers
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INSOMNIA_API_KEY: INSOMNIA_API_KEY
capability:
