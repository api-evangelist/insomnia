      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mock-server-mock-servers.getmockserver
      outputParameters:
      - type: object
        mapping: $.
    - name: insomnia-update-mock-server
      description: Insomnia Update Mock Server
      hints:
        readOnly: false
