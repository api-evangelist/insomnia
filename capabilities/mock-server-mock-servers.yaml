    resources:
    - name: mock-servers
      path: /mock-servers
      operations:
      - name: listmockservers
        method: GET
        description: Insomnia List Mock Servers
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: workspaceId
          in: query
          type: string
          description: Filter mock servers by workspace identifier.
      - name: createmockserver
        method: POST
        description: Insomnia Create Mock Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: mock-servers-mockServerId
      path: /mock-servers/{mockServerId}
      operations:
      - name: getmockserver
        method: GET
        description: Insomnia Get Mock Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: updatemockserver
        method: PUT
        description: Insomnia Update Mock Server
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
