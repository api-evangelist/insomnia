naftiko: 1.0.0-alpha2
info:
  label: Insomnia Mock Server API — Mock Logs
  description: 'Insomnia Mock Server API — Mock Logs. 1 operations. Lead operation: Insomnia List Mock Server Logs. Self-contained
    Naftiko capability covering one Insomnia business surface.'
  tags:
  - Insomnia
  - Mock Logs
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    INSOMNIA_API_KEY: INSOMNIA_API_KEY
capability:
  consumes:
  - type: http
    namespace: mock-server-mock-logs
    baseUri: https://mock.insomnia.rest
    description: Insomnia Mock Server API — Mock Logs business capability. Self-contained, no shared references.
    resources:
    - name: mock-servers-mockServerId-logs
      path: /mock-servers/{mockServerId}/logs
      operations:
      - name: listmockserverlogs
        method: GET
        description: Insomnia List Mock Server Logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
          description: Maximum number of log entries to return.
        - name: offset
          in: query
          type: integer
          description: Number of log entries to skip for pagination.
    authentication:
      type: bearer
      token: '{{env.INSOMNIA_API_KEY}}'
  exposes:
  - type: rest
    namespace: mock-server-mock-logs-rest
    port: 8080
    description: REST adapter for Insomnia Mock Server API — Mock Logs. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/mock-servers/{mockserverid}/logs
      name: mock-servers-mockserverid-logs
      description: REST surface for mock-servers-mockServerId-logs.
      operations:
      - method: GET
        name: listmockserverlogs
        description: Insomnia List Mock Server Logs
        call: mock-server-mock-logs.listmockserverlogs
        with:
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: mock-server-mock-logs-mcp
    port: 9090
    transport: http
    description: MCP adapter for Insomnia Mock Server API — Mock Logs. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: insomnia-list-mock-server-logs
      description: Insomnia List Mock Server Logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: mock-server-mock-logs.listmockserverlogs
      with:
        limit: tools.limit
        offset: tools.offset
      outputParameters:
      - type: object
        mapping: $.
